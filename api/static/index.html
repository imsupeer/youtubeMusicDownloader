<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube MP3 Downloader</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: { DEFAULT: '#121212', card: '#1a1a1a', raised: '#1e1e1e' },
            accent: { DEFAULT: '#ff0033', hover: '#e6002e' },
          },
          fontFamily: { sans: ['Inter', 'Segoe UI', 'system-ui', 'sans-serif'] },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="/static/icon.png" type="image/png" />
</head>
<body class="h-full bg-surface text-gray-100 font-sans antialiased">
  <div class="min-h-full flex flex-col">
    <header class="border-b border-white/10 bg-black/40 backdrop-blur-sm">
      <div class="max-w-4xl mx-auto px-6 py-5 flex items-center gap-4">
        <img src="/static/icon.png" alt="" class="w-10 h-10 rounded-lg" />
        <div>
          <h1 class="text-xl font-bold tracking-tight">YouTube MP3 Downloader</h1>
          <p class="text-sm text-gray-400">FastAPI · SSE · yt-dlp</p>
        </div>
      </div>
    </header>

    <main class="flex-1 max-w-4xl w-full mx-auto px-6 py-8 space-y-6">
      <section class="rounded-xl border border-white/10 bg-surface-card p-5 space-y-4">
        <h2 class="text-xs font-semibold uppercase tracking-widest text-gray-500">Source</h2>
        <div class="flex gap-3">
          <input id="url-input" type="url" placeholder="Paste a YouTube video or playlist URL…"
            class="flex-1 rounded-lg bg-surface-raised border border-white/10 px-4 py-2.5 text-sm focus:outline-none focus:border-accent placeholder:text-gray-600" />
          <button id="probe-btn"
            class="rounded-lg border border-white/15 px-5 py-2.5 text-sm font-semibold hover:border-accent hover:text-white transition-colors">
            Detect
          </button>
        </div>
        <p id="probe-status" class="text-sm text-gray-400">Paste a URL and click Detect to get started.</p>
      </section>

      <section class="rounded-xl border border-white/10 bg-surface-card p-5 space-y-4">
        <h2 class="text-xs font-semibold uppercase tracking-widest text-gray-500">Output</h2>
        <div class="grid sm:grid-cols-2 gap-4">
          <label class="block space-y-1.5">
            <span class="text-xs text-gray-500">Quality</span>
            <select id="bitrate-select"
              class="w-full rounded-lg bg-surface-raised border border-white/10 px-4 py-2.5 text-sm focus:outline-none focus:border-accent">
            </select>
          </label>
          <label class="block space-y-1.5 sm:col-span-2">
            <span class="text-xs text-gray-500">Output folder</span>
            <div class="flex gap-2">
              <input id="outdir-input" type="text" placeholder="Choose a folder…"
                class="flex-1 min-w-0 rounded-lg bg-surface-raised border border-white/10 px-4 py-2.5 text-sm focus:outline-none focus:border-accent" />
              <button id="browse-folder-btn" type="button" title="Choose folder" aria-label="Choose folder"
                class="shrink-0 rounded-lg border border-white/15 px-3 py-2.5 hover:border-accent hover:bg-white/5 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-gray-300">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 0 1 4.5 9.75h15A2.25 2.25 0 0 1 21.75 12v.75m-8.69-6.44-2.12-2.12a1.5 1.5 0 0 0-1.061-.44H4.5A2.25 2.25 0 0 0 2.25 6v12a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9a2.25 2.25 0 0 0-2.25-2.25h-5.379a1.5 1.5 0 0 1-1.06-.44z" />
                </svg>
              </button>
            </div>
          </label>
        </div>
      </section>

      <section class="rounded-xl border border-white/10 bg-surface-card p-5 space-y-4">
        <div class="flex items-center justify-between">
          <h2 class="text-xs font-semibold uppercase tracking-widest text-gray-500">Download Queue</h2>
          <div class="flex gap-2">
            <button id="select-all-btn" class="text-xs text-gray-400 hover:text-white hidden">Select all</button>
            <button id="select-none-btn" class="text-xs text-gray-400 hover:text-white hidden">Select none</button>
          </div>
        </div>
        <ul id="track-list" class="space-y-1 max-h-64 overflow-y-auto rounded-lg border border-white/5 bg-black/20 p-2 text-sm text-gray-500">
          <li class="px-3 py-2">No tracks yet.</li>
        </ul>
      </section>

      <div class="space-y-3">
        <div class="h-2.5 rounded-full bg-surface-raised overflow-hidden">
          <div id="progress-bar" class="h-full w-0 rounded-full bg-gradient-to-r from-accent to-pink-500 transition-all duration-300"></div>
        </div>
        <p id="footer-status" class="text-sm text-gray-400">Ready</p>
        <button id="download-btn"
          class="w-full rounded-lg bg-accent hover:bg-accent-hover py-3 text-sm font-semibold transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
          Download
        </button>
      </div>
    </main>

    <footer class="border-t border-white/10 py-4 text-center text-xs text-gray-600">
      v2.0 · Python · FastAPI · Pydantic · asyncio · yt-dlp
    </footer>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
